name: Gold Price Monitor

on:
  schedule:
    - cron: "0 1-17 * * 1-5"   # Mon-Fri: 8am-midnight BKK (UTC+7)
    - cron: "0 3-10 * * 6"     # Sat: Asia session
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Check Gold Price
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gold monitor
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          DROP_THRESHOLD:       ${{ vars.DROP_THRESHOLD || '0.5' }}
          GIST_GITHUB_TOKEN:    ${{ secrets.GIST_GITHUB_TOKEN }}
          GIST_ID:              ${{ secrets.GIST_ID }}
          TWELVE_DATA_API_KEY:  ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python gold_monitor.py
