name: Gold Price Monitor

on:
  schedule:
    - cron: "0 1-17 * * 1-5"   # တနင်္လာ–သောကြာ 8am–midnight BKK
    - cron: "0 3-10 * * 6"     # စနေ Asia session
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Check Gold Price
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Get Bangkok date
        id: bkk_date
        run: echo "date=$(TZ=Asia/Bangkok date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache state
        uses: actions/cache@v4
        with:
          path: gold_state.json
          key: gold-state-${{ steps.bkk_date.outputs.date }}-${{ github.run_number }}
          restore-keys: |
            gold-state-${{ steps.bkk_date.outputs.date }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests pytz

      - name: Run gold monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DROP_THRESHOLD:     ${{ vars.DROP_THRESHOLD || '0.5' }}
        run: python gold_monitor.py
